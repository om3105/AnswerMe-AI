# Alembic Configuration File
# Used by Alembic for database migration management.

[alembic]
# Path to migration scripts
script_location = app/db/migrations

# Template for migration file names
# Using a revision ID prefix for ordering
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for timestamps in migration files
timezone = UTC

# SQLAlchemy URL — overridden in env.py to use async driver
sqlalchemy.url = postgresql+asyncpg://answerme:change_me_in_production@postgres:5432/answerme_db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
