# ==============================
# AnswerMe AI — Docker Compose (Production)
# ==============================
# Orchestrates 5 services: backend, frontend, postgres, redis, nginx
#
# Usage:
#   docker compose up --build        # Build and start all services
#   docker compose up -d             # Start in background (detached)
#   docker compose down              # Stop all services
#   docker compose logs -f backend   # Follow backend logs
#   docker compose ps                # List running containers
#
# Architecture:
#   Client → Nginx (:80) → Backend (FastAPI :8000)
#                         → Frontend (React SPA :80)
#                         → PostgreSQL (:5432, internal only)
#                         → Redis (:6379, internal only)

services:
  # ──────────────────────────────
  # Nginx — Reverse Proxy
  # ──────────────────────────────
  # Single entry point for all traffic.
  # Routes /api/* to backend, /* to frontend.
  nginx:
    image: nginx:alpine
    container_name: answerme-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - answerme-network
    restart: unless-stopped

  # ──────────────────────────────
  # Backend — FastAPI
  # ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: answerme-backend
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-answerme}:${POSTGRES_PASSWORD:-change_me_in_production}@postgres:5432/${POSTGRES_DB:-answerme_db}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - answerme-network
    restart: unless-stopped
    # Health check is defined in the Dockerfile

  # ──────────────────────────────
  # Frontend — React + Vite (served by Nginx)
  # ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: answerme-frontend
    networks:
      - answerme-network
    restart: unless-stopped

  # ──────────────────────────────
  # PostgreSQL — Primary Database
  # ──────────────────────────────
  # NOT exposed to host by default (security).
  # Access via: docker compose exec postgres psql -U answerme -d answerme_db
  postgres:
    image: postgres:16-alpine
    container_name: answerme-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-answerme}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-answerme_db}
    volumes:
      # Named volume for persistent data (survives container restarts)
      - postgres_data:/var/lib/postgresql/data
      # Init script runs on first creation only
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - answerme-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-answerme} -d ${POSTGRES_DB:-answerme_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ──────────────────────────────
  # Redis — Cache & Rate Limiting
  # ──────────────────────────────
  # NOT exposed to host by default (security).
  # Access via: docker compose exec redis redis-cli
  redis:
    image: redis:7-alpine
    container_name: answerme-redis
    # Require password in production, enable append-only persistence
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - answerme-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# ──────────────────────────────
# Volumes — Persistent Data
# ──────────────────────────────
# Named volumes persist data across container restarts.
# Without volumes, data is lost when the container is removed.
volumes:
  postgres_data:
    name: answerme-postgres-data
  redis_data:
    name: answerme-redis-data

# ──────────────────────────────
# Networks — Service Communication
# ──────────────────────────────
# All services on the same network can communicate by service name.
# Docker Compose creates a DNS entry for each service name.
# e.g., backend can reach postgres at hostname "postgres"
networks:
  answerme-network:
    name: answerme-network
    driver: bridge
