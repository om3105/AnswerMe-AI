# ==============================
# AnswerMe AI — Nginx Reverse Proxy Configuration
# ==============================
# This is the MAIN reverse proxy that sits in front of all services.
# It routes traffic to the correct backend based on the URL path.
#
# Architecture:
#   Client → Nginx (:80) → /api/*  → Backend (FastAPI :8000)
#                         → /*     → Frontend (React SPA :80)
#
# Why a reverse proxy?
#   1. Single entry point: clients connect to one port (80/443)
#   2. TLS termination: HTTPS is handled here, backends use plain HTTP
#   3. Load balancing: distribute traffic across multiple backend instances
#   4. Static file serving: Nginx is 10-50x faster than app servers
#   5. Security: backends are not directly exposed to the internet

# Upstream definitions — named groups of backend servers
# Docker Compose DNS resolves service names to container IPs
upstream backend_upstream {
    server backend:8000;
}

upstream frontend_upstream {
    server frontend:80;
}

server {
    listen 80;
    server_name localhost;

    # ──────────────────────────────
    # API routes → FastAPI backend
    # ──────────────────────────────
    location /api/ {
        proxy_pass http://backend_upstream;

        # Forward original client information to the backend
        # Without these, FastAPI sees Nginx's IP instead of the client's
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (needed for future real-time features)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ──────────────────────────────
    # Swagger/ReDoc API docs → FastAPI
    # ──────────────────────────────
    location /docs {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /redoc {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /openapi.json {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
    }

    # ──────────────────────────────
    # All other routes → React Frontend
    # ──────────────────────────────
    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ──────────────────────────────
    # Security headers
    # ──────────────────────────────
    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # Enable XSS protection
    add_header X-XSS-Protection "1; mode=block" always;
    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ──────────────────────────────
    # Performance
    # ──────────────────────────────
    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # Client body size (for file uploads in future phases)
    client_max_body_size 10M;
}
