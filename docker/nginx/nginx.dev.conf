# ==============================
# Nginx Development Configuration
# ==============================
# Proxies to Vite dev server (port 5173) instead of frontend Nginx (port 80).
# Vite's HMR WebSocket needs special proxy handling.

upstream backend_upstream {
    server backend:8000;
}

upstream frontend_upstream {
    # Vite dev server runs on port 5173 in development
    server frontend:5173;
}

server {
    listen 80;
    server_name localhost;

    # API routes → FastAPI backend
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Swagger/ReDoc
    location /docs {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /redoc {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
    }

    # All other routes → Vite dev server
    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Vite HMR WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    client_max_body_size 10M;
}
