# Nginx config for React SPA (used inside frontend Docker container)
# This handles client-side routing: all non-file routes → index.html

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: if the file doesn't exist, serve index.html
    # This is critical for React Router — without it, refreshing
    # /dashboard would return 404 because there's no dashboard.html file
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (JS, CSS, images)
    # Vite adds content hashes to filenames, so cache busting is automatic
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
